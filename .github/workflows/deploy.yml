name: CI/CD - bdcalling-academy-server

on:
    push:
        branches: ["main"]

env:
    IMAGE_NAME: bdcalling-academy-server

jobs:
    ci:
        name: Build & Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Type check
              run: npx tsc --noEmit

            - name: Build project
              run: npm run build

    docker:
        name: Build & Push Docker Image
        runs-on: ubuntu-latest
        needs: ci

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Login to DockerHub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build Docker Image
              run: |
                  docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1 .
                  docker tag ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1 \
                             ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

            - name: Push Docker Image
              run: |
                  docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1
                  docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    deploy:
        name: Deploy to Server
        runs-on: ubuntu-latest
        needs: docker

        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  script: |
                      docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1

                      docker stop ${{ env.IMAGE_NAME }} || true
                      docker rm ${{ env.IMAGE_NAME }} || true

                      docker run -d \
                        --name ${{ env.IMAGE_NAME }} \
                        -p 5000:5000 \
                        --env-file /var/www/bdcalling/.env \
                        --restart unless-stopped \
                        ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:v1

                      docker image prune -f
